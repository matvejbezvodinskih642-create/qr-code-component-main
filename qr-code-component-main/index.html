<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | QR code component</title>
  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
</head>

<body>
  <main class="page-main">
    <article class="qr-card">
      <img src="images/image-qr-code.png" alt="QR code to visit Frontend Mentor website" class="qr-card__imge">
      <h1 class="qr-card__title">Improve your front-end skills
        <br> by building projects
      </h1>
      <p class="qr-card__paragraph">Scan the QR code to visit Frontend
        <br>Mentor and take your coding skills
        <br> to the next level
      </p>
    </article>
  </main>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Your Name Here</a>.
  </footer>

</body>

</html>
